[package]
name = "ccm-core"
version = "0.1.8"
description = "OreoDeck core — profile store, usage, keychain, terminal, and UniFFI library"
license = "Apache-2.0"
repository = "https://github.com/OreoSolutions/oreodeck"
edition = "2021"
rust-version = "1.80"

[lib]
name = "ccm_core"
crate-type = ["staticlib", "lib"]

[dependencies]
uniffi = { version = "0.32.0", features = ["cli"] }
thiserror = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chrono = { version = "0.4", default-features = false, features = ["std"] }
security-framework = "3"
regex = "1"

[dev-dependencies]
serial_test = "3"
tempfile = "3"

[[bin]]
name = "uniffi-bindgen"
path = "uniffi-bindgen.rs"
